# Hook deployment config (dotenv-style KEY=VALUE)
# This template is source-of-truth for key ordering and section structure.

# -----------------------------------------------------------------------------
# 1) RPC / network context
# -----------------------------------------------------------------------------

# Required. RPC endpoint for the target chain.
RPC_URL=
# Local-only key by design; intentionally not part of shared chain configs.
# FORK_URL=

# Required. Uniswap v4 PoolManager address for the target chain.
POOL_MANAGER=

# -----------------------------------------------------------------------------
# 2) Pool binding
# -----------------------------------------------------------------------------

# Required. Non-stable asset in the pool pair.
VOLATILE=
# Required. Stable/USD-like asset used as telemetry quote token.
STABLE=
# Required. Stable token decimals accepted by hook logic (6 or 18).
STABLE_DECIMALS=6
# Required. Pool tick spacing.
TICK_SPACING=10

# -----------------------------------------------------------------------------
# 3) Bootstrap price and optional LP range
# -----------------------------------------------------------------------------

# Required for pool initialization. Interpreted as STABLE per 1 VOLATILE.
INIT_PRICE_USD=
# Optional. Default min LP range used by helper scripts.
LIQ_RANGE_MIN_USD=
# Optional. Default max LP range used by helper scripts.
LIQ_RANGE_MAX_USD=

# -----------------------------------------------------------------------------
# 4) Access and deployment credentials
# -----------------------------------------------------------------------------

# Optional. Owner/admin account. Fallback: deployer signer if empty.
OWNER=${DEFAULT_OWNER:-}
# Required for broadcast. Fallback to global default if chain-specific key is unset.
PRIVATE_KEY=${DEFAULT_PRIVATE_KEY:-}
# Optional. Existing deployed hook address; if empty, scripts read scripts/out/deploy.<chain>.json.
HOOK_ADDRESS=
# Optional. Hook fee recipient. If empty, deploy script defaults it to OWNER.
HOOK_FEE_ADDRESS=

# -----------------------------------------------------------------------------
# 5) Explicit regime fees
# -----------------------------------------------------------------------------

# Required. Explicit regime fees in percent: FLOOR_TIER < CASH_TIER < EXTREME_TIER.
# Required. Lowest tier that can be selected.
FLOOR_TIER=0.04
# Required. Mid-tier used by controller transitions.
CASH_TIER=0.25
# Required. Highest tier used by controller transitions.
EXTREME_TIER=0.45

# -----------------------------------------------------------------------------
# 6) Timing and smoothing
# -----------------------------------------------------------------------------

# Required. Controller period length (seconds).
PERIOD_SECONDS=300
# Required. EMA window in periods. Contract enforces [2..64].
EMA_PERIODS=12
# Required. Deadband threshold in basis points.
DEADBAND_BPS=1000
# Required. Inactivity reset threshold in seconds; must be > PERIOD_SECONDS.
LULL_RESET_SECONDS=3600

# -----------------------------------------------------------------------------
# 7) Monetization
# -----------------------------------------------------------------------------

# Required. Hook fee share in percent of LP fee. Contract hard-cap is 10.
HOOK_FEE_PERCENT=0

# -----------------------------------------------------------------------------
# 8) Controller thresholds and confirmations
# -----------------------------------------------------------------------------

# Required. Volume threshold to move FLOOR/CASH upward.
MIN_CLOSEVOL_TO_CASH_USD6=10000000
# Required. Ratio threshold to move FLOOR/CASH upward.
UP_R_TO_CASH_BPS=11000
# Required. Hold duration at CASH regime.
CASH_HOLD_PERIODS=4

# Required. Volume threshold to move into EXTREME.
MIN_CLOSEVOL_TO_EXTREME_USD6=20000000
# Required. Ratio threshold to move into EXTREME.
UP_R_TO_EXTREME_BPS=12000
# Required. Confirmation periods for upward EXTREME transition.
UP_EXTREME_CONFIRM_PERIODS=2
# Required. Hold duration at EXTREME regime.
EXTREME_HOLD_PERIODS=4

# Required. Ratio threshold to move down from EXTREME.
DOWN_R_FROM_EXTREME_BPS=13000
# Required. Confirmation periods for downward EXTREME transition.
DOWN_EXTREME_CONFIRM_PERIODS=2
# Required. Ratio threshold to move down from CASH.
DOWN_R_FROM_CASH_BPS=13000
# Required. Confirmation periods for downward CASH transition.
DOWN_CASH_CONFIRM_PERIODS=3

# Required. Emergency floor trigger threshold; must be > 0.
EMERGENCY_FLOOR_CLOSEVOL_USD6=1000000
# Required. Confirmation periods for emergency floor transition.
EMERGENCY_CONFIRM_PERIODS=3
