# Hook deployment config (dotenv-style KEY=VALUE)
# Uniswap v4 hook + pool bootstrap config.
#
# Used by:
#   - ./test/scripts/test_run.sh <local|sepolia|prod> <fast|full>
#   - ./scripts/deploy_hook.sh --chain <chain>
#   - ./scripts/create_pool.sh --chain <chain>
#
# Pool binding is explicit:
#   VOLATILE = non-stable side (e.g. WETH)
#   STABLE   = USD-like token used as the unit for INIT_PRICE_USD
#
# INIT_PRICE_USD is interpreted as STABLE per 1 VOLATILE.
# Example: INIT_PRICE_USD=3000
#
# Secrets live in ./.env (DEFAULT_PRIVATE_KEY / DEFAULT_OWNER).
# RPC
RPC_URL=https://optimism-rpc.publicnode.com
FORK_URL=

# Network
POOL_MANAGER=0x9a13F98Cb987694C9F086b1F5eB990EeA8264Ec3

# Pool binding
# Native ETH for v4 is represented as address(0).
VOLATILE=0x0000000000000000000000000000000000000000
STABLE=0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85
STABLE_DECIMALS=6
TICK_SPACING=10

# Init price (leave empty on production configs until you set it intentionally)
INIT_PRICE_USD=1989

# Roles / keys
# Optional explicit admin; if empty deploy script defaults OWNER to deployer.
OWNER=${DEFAULT_OWNER:-}
PRIVATE_KEY=${DEFAULT_PRIVATE_KEY:-}

# Optional: reuse already deployed hook (otherwise auto-filled from scripts/out/deploy.<chain>.json)
HOOK_ADDRESS=

# Strategy params (floor/cap tiers must exist in FEE_TIERS below)
FLOOR_TIER=0.04
CAP_TIER=0.90
FEE_TIERS=0.04,0.25,0.90
# Hook fee share in percent of LP fees (10 = 10%).
HOOK_FEE_PERCENT=0
# Immutable guardrail: hook fee percent cannot exceed this value.
HOOK_FEE_LIMIT=10
# Required when HOOK_FEE_PERCENT > 0.
HOOK_FEE_ADDRESS=
CASH_TIER=0.25
EXTREME_TIER=0.90
MIN_CLOSEVOL_TO_CASH_USD6=1000000000
UP_R_TO_CASH_BPS=18000
CASH_HOLD_PERIODS=4
MIN_CLOSEVOL_TO_EXTREME_USD6=4000000000
UP_R_TO_EXTREME_BPS=40000
UP_EXTREME_CONFIRM_PERIODS=2
EXTREME_HOLD_PERIODS=4
DOWN_R_FROM_EXTREME_BPS=13000
DOWN_EXTREME_CONFIRM_PERIODS=2
DOWN_R_FROM_CASH_BPS=10500
DOWN_CASH_CONFIRM_PERIODS=3
EMERGENCY_FLOOR_CLOSEVOL_USD6=600000000
EMERGENCY_CONFIRM_PERIODS=3

# Timing / smoothing
PERIOD_SECONDS=300
EMA_PERIODS=36
DEADBAND_BPS=1000
LULL_RESET_SECONDS=1800

# Pause mode
# On-chain mutable params (no redeploy required):
# - owner-only admin model (single privileged account)
# - requires paused=true: FEE_TIERS + FLOOR/CASH/EXTREME/CAP roles, PERIOD_SECONDS/EMA_PERIODS/LULL_RESET_SECONDS/DEADBAND_BPS, controller params
# - state reset on tier/timing updates: periodVol=0, emaVol=0, streaks/holds=0, feeIdx=floor, periodStart=block.timestamp (or 0 before pool init)
