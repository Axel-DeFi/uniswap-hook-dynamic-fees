# Hook deployment config (dotenv-style KEY=VALUE)
# Uniswap v4 hook + pool bootstrap config.
#
# Used by:
#   - ./test/scripts/test_run.sh <local|sepolia|prod> <fast|full>
#   - ./scripts/deploy_hook.sh --chain <chain>
#   - ./scripts/create_pool.sh --chain <chain>
#
# Pool binding is explicit:
#   VOLATILE = non-stable side (e.g. WETH)
#   STABLE   = USD-like token used as the unit for INIT_PRICE_USD
#
# INIT_PRICE_USD is interpreted as STABLE per 1 VOLATILE.
# Example: INIT_PRICE_USD=3000
#
# Secrets live in ./.env (DEFAULT_PRIVATE_KEY / DEFAULT_CREATOR).
# RPC
RPC_URL=https://base-rpc.publicnode.com
FORK_URL=

# Network
POOL_MANAGER=0x498581fF718922c3f8e6A244956aF099B2652b2b

# Pool binding
VOLATILE=0x4200000000000000000000000000000000000006
STABLE=0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913
STABLE_DECIMALS=6
TICK_SPACING=10

# Init price (leave empty on production configs until you set it intentionally)
INIT_PRICE_USD=

# Roles / keys
# Optional explicit admin; if empty deploy script defaults CREATOR to deployer.
CREATOR=${DEFAULT_CREATOR:-}
PRIVATE_KEY=${DEFAULT_PRIVATE_KEY:-}

# Optional: reuse already deployed hook (otherwise auto-filled from scripts/out/deploy.<chain>.json)
HOOK_ADDRESS=

# Strategy params (floor/cap tiers must exist in FEE_TIERS below)
FLOOR_TIER=0.04
CAP_TIER=0.45
FEE_TIERS=0.009,0.04,0.09,0.25,0.45,0.90
# Creator fee share in percent of LP fees (10 = 10%).
CREATOR_FEE_PERCENT=10
# Required when CREATOR_FEE_PERCENT > 0.
CREATOR_FEE_ADDRESS=

# Timing / smoothing
PERIOD_SECONDS=300
EMA_PERIODS=12
DEADBAND_BPS=1000
LULL_RESET_SECONDS=3600

# Pause mode
