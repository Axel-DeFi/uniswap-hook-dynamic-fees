# Hook deployment config (dotenv-style KEY=VALUE)
# Local staging profile for deterministic full-coverage Anvil runs.

# RPC
RPC_URL=http://127.0.0.1:8545
FORK_URL=

# Network bindings (runner overwrites with freshly deployed local addresses)
POOL_MANAGER=0x0000000000000000000000000000000000000001
VOLATILE=0x0000000000000000000000000000000000000002
STABLE=0x0000000000000000000000000000000000000003
STABLE_DECIMALS=6
TICK_SPACING=10

# Init price (STABLE per 1 VOLATILE)
INIT_PRICE_USD=3000

# Roles / keys
# Optional explicit admin; if empty deploy script defaults OWNER to deployer.
OWNER=${DEFAULT_OWNER:-}
PRIVATE_KEY=${DEFAULT_PRIVATE_KEY:-}

# Optional reuse of already deployed hook
HOOK_ADDRESS=

# A tiers/roles
FEE_TIERS=0.04,0.25,0.90
FLOOR_TIER=0.04
CAP_TIER=0.90
CASH_TIER=0.25
EXTREME_TIER=0.90

# E timing (fast)
PERIOD_SECONDS=30
EMA_PERIODS=6
DEADBAND_BPS=1000
LULL_RESET_SECONDS=120

# B controller (easy trigger)
MIN_CLOSEVOL_TO_CASH_USD6=1000000
UP_R_TO_CASH_BPS=10500
CASH_HOLD_PERIODS=1
MIN_CLOSEVOL_TO_EXTREME_USD6=2000000
UP_R_TO_EXTREME_BPS=11000
UP_EXTREME_CONFIRM_PERIODS=1
EXTREME_HOLD_PERIODS=1
DOWN_R_FROM_EXTREME_BPS=10200
DOWN_EXTREME_CONFIRM_PERIODS=1
DOWN_R_FROM_CASH_BPS=10100
DOWN_CASH_CONFIRM_PERIODS=1
EMERGENCY_FLOOR_CLOSEVOL_USD6=500000
EMERGENCY_CONFIRM_PERIODS=1

# Hook fee enabled
HOOK_FEE_LIMIT=10
HOOK_FEE_PERCENT=10
# Required when HOOK_FEE_PERCENT > 0
HOOK_FEE_ADDRESS=
