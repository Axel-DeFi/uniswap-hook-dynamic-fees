name: release-version-check

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  release-version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify VERSION/tag/changelog consistency
        run: bash scripts/release/check.sh
